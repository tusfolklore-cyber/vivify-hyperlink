    /* ─── PROXY FETCHER (UPDATED) ─── */
    async function fetchViaProxy(targetUrl) {
      // List of proxies that return the raw response body.
      // We'll try them in order.
      const proxyList = [
        // 1. allorigins.win (raw)
        url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        // 2. corsproxy.io (with user-agent)
        url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
        // 3. thingproxy (freeboard)
        url => `https://thingproxy.freeboard.io/fetch/${url}`,
        // 4. codetabs (returns raw response)
        url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
      ];

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 8000);

      for (let i = 0; i < proxyList.length; i++) {
        const proxyUrl = proxyList[i](targetUrl);
        try {
          const res = await fetch(proxyUrl, {
            signal: controller.signal,
            headers: {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            }
          });
          if (!res.ok) throw new Error(`Proxy ${i+1} status ${res.status}`);
          const text = await res.text();
          // If we get a non-empty string, it's probably the response
          if (text && text.length > 0) {
            clearTimeout(timeout);
            return text;
          }
        } catch (err) {
          // Proxy failed, try next
          console.warn(`Proxy ${i+1} failed:`, err.message);
          continue;
        }
      }
      clearTimeout(timeout);
      throw new Error('All proxies failed');
    }

    /* ─── SHORTENERS ─── (unchanged) */
    async function shortenWithIsGd(longUrl) {
      const target = 'https://is.gd/create.php?format=simple&url=' + encodeURIComponent(longUrl);
      const text = await fetchViaProxy(target);
      if (text.startsWith('https://is.gd/') || text.startsWith('http://is.gd/')) {
        return text.trim();
      } else if (text.startsWith('https://') || text.startsWith('http://')) {
        return text.trim();
      } else {
        throw new Error('is.gd API error: ' + text.trim());
      }
    }

    async function shortenWithShorturlAt(longUrl) {
      const target = 'https://www.shorturl.at/api.php?url=' + encodeURIComponent(longUrl);
      const text = await fetchViaProxy(target);
      if (text.startsWith('https://shorturl.at/') || text.startsWith('http://shorturl.at/')) {

      }
    }
